<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Enroll Student | SRMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/srms.css}"/>
</head>
<body>
<div th:replace="~{layout/fragments :: navbar}" th:with="activePage='enrollments'"></div>

<main class="srms-main">
    <div class="container-fluid px-4">
        <div class="srms-page-header">
            <div>
                <h1 class="srms-page-title"><i class="bi bi-journal-plus me-2 text-primary"></i>Enroll Student</h1>
                <p class="srms-page-subtitle">Register a student for a course in a specific semester</p>
            </div>
            <a th:href="@{/students}" class="btn srms-btn-outline"><i class="bi bi-arrow-left me-1"></i>Back to Students</a>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="srms-card">
                    <div class="alert alert-danger" th:if="${errorMessage}">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i><span th:text="${errorMessage}"></span>
                    </div>

                    <form th:action="@{/enrollments/new}" method="post" id="enrollForm">
                        <div class="row g-4">
                            <!-- Student -->
                            <div class="col-12">
                                <label for="studentId" class="form-label srms-label">Student <span class="text-danger">*</span></label>
                                <select id="studentId" name="studentId" class="form-select srms-input" required>
                                    <option value="">-- Select Student --</option>
                                    <option th:each="s : ${students}"
                                            th:value="${s.id}"
                                            th:text="${s.rollNumber + ' — ' + s.name + ' (' + s.department + ')'}"
                                            th:selected="${s.id == preselectedStudentId}">Student</option>
                                </select>
                            </div>

                            <!-- Course -->
                            <div class="col-12">
                                <label for="courseId" class="form-label srms-label">Course <span class="text-danger">*</span></label>
                                <select id="courseId" name="courseId" class="form-select srms-input" required>
                                    <option value="">-- Select Course --</option>
                                    <option th:each="c : ${courses}"
                                            th:value="${c.id}"
                                            th:text="${c.courseCode + ' — ' + c.courseName + ' (' + c.credits + ' cr)'}">Course</option>
                                </select>
                            </div>

                            <!-- Semester -->
                            <div class="col-md-6">
                                <label for="semester" class="form-label srms-label">Semester <span class="text-danger">*</span></label>
                                <select id="semester" name="semester" class="form-select srms-input" required>
                                    <option th:each="s : ${#numbers.sequence(1, 10)}" th:value="${s}" th:text="'Semester ' + ${s}">1</option>
                                </select>
                            </div>

                            <!-- Academic Year -->
                            <div class="col-md-6">
                                <label for="academicYear" class="form-label srms-label">Academic Year <span class="text-danger">*</span></label>
                                <input type="text" id="academicYear" name="academicYear" class="form-control srms-input"
                                       placeholder="e.g. 2024-25" pattern="\d{4}-\d{2}" required value="2024-25"/>
                                <div class="form-text">Format: YYYY-YY (e.g. 2024-25)</div>
                            </div>
                        </div>

                        <div class="d-flex gap-3 mt-4 pt-3 border-top">
                            <button type="submit" class="btn srms-btn-primary" id="submitEnrollBtn">
                                <i class="bi bi-check-circle-fill me-2"></i>Enroll Student
                            </button>
                            <a th:href="@{/students}" class="btn srms-btn-outline"><i class="bi bi-x-circle me-1"></i>Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/srms.js}"></script>
</body>
</html>
