<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Students | SRMS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/srms.css}"/>
</head>
<body>
<div th:replace="~{layout/fragments :: navbar}" th:with="activePage='students'"></div>

<div class="container-fluid px-4 pt-3" th:if="${successMessage != null}">
    <div class="alert alert-success alert-dismissible fade show srms-alert-success">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<main class="srms-main">
    <div class="container-fluid px-4">
        <div class="srms-page-header">
            <div>
                <h1 class="srms-page-title"><i class="bi bi-people-fill me-2 text-primary"></i>Students</h1>
                <p class="srms-page-subtitle" th:text="${students.size() + ' student(s) found'}">0 students</p>
            </div>
            <a th:href="@{/students/new}" class="btn srms-btn-primary"><i class="bi bi-person-plus-fill me-2"></i>Add Student</a>
        </div>

        <!-- Search Bar -->
        <div class="srms-card mb-4">
            <form method="get" th:action="@{/students}" class="d-flex gap-3" id="studentSearchForm">
                <div class="flex-grow-1">
                    <input type="text" id="searchQuery" name="query" class="form-control srms-input"
                           placeholder="Search by name or roll number..." th:value="${query}"/>
                </div>
                <button type="submit" class="btn srms-btn-primary" id="searchBtn">
                    <i class="bi bi-search me-1"></i>Search
                </button>
                <a th:href="@{/students}" class="btn srms-btn-outline" th:if="${query != null and !#strings.isEmpty(query)}">
                    <i class="bi bi-x-circle me-1"></i>Clear
                </a>
            </form>
        </div>

        <!-- Students Table -->
        <div class="srms-card">
            <div class="table-responsive">
                <table class="table srms-table mb-0" id="studentsTable">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Roll No.</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Semester</th>
                            <th>Email</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="student, iterStat : ${students}">
                            <td class="text-muted" th:text="${iterStat.count}">1</td>
                            <td><code th:text="${student.rollNumber}">23CS001</code></td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="srms-avatar" th:text="${#strings.substring(student.name, 0, 1)}">R</div>
                                    <span th:text="${student.name}">Name</span>
                                </div>
                            </td>
                            <td><span class="badge srms-badge-dept" th:text="${student.department}">CSE</span></td>
                            <td>Sem <span th:text="${student.currentSem}">3</span></td>
                            <td class="text-muted small" th:text="${student.email}">-</td>
                            <td>
                                <span th:if="${student.isActive}" class="badge srms-badge-active"><i class="bi bi-circle-fill me-1" style="font-size:.5rem"></i>Active</span>
                                <span th:unless="${student.isActive}" class="badge srms-badge-inactive"><i class="bi bi-circle-fill me-1" style="font-size:.5rem"></i>Inactive</span>
                            </td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/students/{id}(id=${student.id})}" class="btn btn-sm srms-btn-icon" title="View Results"><i class="bi bi-eye"></i></a>
                                    <a th:href="@{/students/{id}/edit(id=${student.id})}" class="btn btn-sm srms-btn-icon" title="Edit"><i class="bi bi-pencil"></i></a>
                                    <form th:if="${student.isActive}" th:action="@{/students/{id}/deactivate(id=${student.id})}" method="post"
                                          onsubmit="return confirm('Deactivate this student?')">
                                        <button type="submit" class="btn btn-sm srms-btn-danger-icon" title="Deactivate"><i class="bi bi-person-dash"></i></button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(students)}">
                            <td colspan="8" class="text-center py-5 text-muted">
                                <i class="bi bi-people fs-1 d-block mb-3 opacity-25"></i>
                                <p th:if="${query != null and !#strings.isEmpty(query)}">No students found matching "<span th:text="${query}"></span>"</p>
                                <p th:unless="${query != null and !#strings.isEmpty(query)}">No students yet. <a th:href="@{/students/new}">Add the first student</a></p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{layout/fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/srms.js}"></script>
</body>
</html>
