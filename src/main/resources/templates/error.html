<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error | ResultFlow</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/srms.css}"/>
</head>
<body>
<div th:replace="~{layout/fragments :: navbar}" th:with="activePage='dashboard'"></div>

<main class="srms-main d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    <div class="text-center px-4">
        <div class="mb-4" style="font-size: 4rem; opacity: 0.2;"><i class="bi bi-exclamation-triangle-fill text-danger"></i></div>
        <h1 class="fw-bold mb-2" th:text="${errorTitle ?: 'Oops!'}">Error</h1>
        <p class="text-muted mb-4 fs-5" th:text="${errorMessage ?: 'Something went wrong. Please try again.'}">Error message here</p>
        <div class="d-flex gap-3 justify-content-center">
            <a th:href="@{/}" class="btn srms-btn-primary"><i class="bi bi-house me-2"></i>Back to Dashboard</a>
            <button onclick="history.back()" class="btn srms-btn-outline"><i class="bi bi-arrow-left me-2"></i>Go Back</button>
        </div>
    </div>
</main>

<div th:replace="~{layout/fragments :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
