<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="Student Result Management System — manage students, courses, enrollments and grades."/>
    <title th:text="${pageTitle != null ? pageTitle + ' | SRMS' : 'SRMS — Student Result Management System'}">SRMS</title>

    <!-- Bootstrap 5.3 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <!-- Google Fonts — Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <!-- Custom SRMS CSS -->
    <link rel="stylesheet" th:href="@{/css/srms.css}"/>
</head>
<body>

<!-- ── Navbar ──────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg srms-navbar sticky-top" id="mainNavbar">
    <div class="container-fluid px-4">
        <a class="navbar-brand srms-brand d-flex align-items-center gap-2" th:href="@{/}">
            <div class="brand-icon">
                <i class="bi bi-mortarboard-fill"></i>
            </div>
            <span>SRMS</span>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navContent" aria-controls="navContent"
                aria-expanded="false" aria-label="Toggle navigation">
            <i class="bi bi-list text-white fs-4"></i>
        </button>

        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-1">
                <li class="nav-item">
                    <a class="nav-link srms-nav-link" th:classappend="${activePage == 'dashboard' ? ' active' : ''}"
                       th:href="@{/}">
                        <i class="bi bi-grid-fill me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link srms-nav-link" th:classappend="${activePage == 'students' ? ' active' : ''}"
                       th:href="@{/students}">
                        <i class="bi bi-people-fill me-1"></i>Students
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link srms-nav-link" th:classappend="${activePage == 'courses' ? ' active' : ''}"
                       th:href="@{/courses}">
                        <i class="bi bi-book-fill me-1"></i>Courses
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link srms-nav-link" th:href="@{/enrollments/new}">
                        <i class="bi bi-journal-plus me-1"></i>Enroll
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link srms-nav-link" th:classappend="${activePage == 'grades' ? ' active' : ''}"
                       th:href="@{/grades/entry}">
                        <i class="bi bi-pencil-square me-1"></i>Grades
                    </a>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                <a class="btn btn-outline-light btn-sm" th:href="@{/students/new}">
                    <i class="bi bi-person-plus-fill me-1"></i>Add Student
                </a>
            </div>
        </div>
    </div>
</nav>

<!-- ── Flash Messages ───────────────────────────────────────────────────── -->
<div class="container-fluid px-4 pt-3" th:if="${successMessage != null or errorMessage != null}">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show srms-alert-success" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}">Success!</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}">Error</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
</div>

<!-- ── Page Content ─────────────────────────────────────────────────────── -->
<main class="srms-main" th:replace="${content}">
    <!-- page-specific content injected here -->
</main>

<!-- ── Footer ───────────────────────────────────────────────────────────── -->
<footer class="srms-footer mt-auto">
    <div class="container-fluid px-4">
        <div class="d-flex justify-content-between align-items-center">
            <span><i class="bi bi-mortarboard-fill me-2 text-primary"></i>SRMS &copy; 2025</span>
            <span class="text-muted small">Student Result Management System &mdash; Spring Boot 3.2</span>
        </div>
    </div>
</footer>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Custom SRMS JS -->
<script th:src="@{/js/srms.js}"></script>
</body>
</html>
