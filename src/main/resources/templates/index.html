<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <meta name="description" content="ResultFlow Dashboard — overview of students, courses, enrollments and grades."/>
    <title>Dashboard | ResultFlow</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/srms.css}"/>
</head>
<body>

<!-- Navbar -->
<div th:replace="~{layout/fragments :: navbar}" th:with="activePage='dashboard'"></div>

<!-- Flash Messages -->
<div class="container-fluid px-4 pt-3" th:if="${successMessage != null}">
    <div class="alert alert-success alert-dismissible fade show srms-alert-success" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i><span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<main class="srms-main">
    <div class="container-fluid px-4">

        <!-- Page Header -->
        <div class="srms-page-header">
            <div>
                <h1 class="srms-page-title"><i class="bi bi-grid-fill me-2 text-primary"></i>Dashboard</h1>
                <p class="srms-page-subtitle">Overview of your academic result management system</p>
            </div>
            <a th:href="@{/students/new}" class="btn srms-btn-primary">
                <i class="bi bi-person-plus-fill me-2"></i>Add Student
            </a>
        </div>

        <!-- Stat Cards -->
        <div class="row g-4 mb-5">
            <div class="col-sm-6 col-xl-3">
                <div class="srms-stat-card srms-stat-blue">
                    <div class="stat-icon"><i class="bi bi-people-fill"></i></div>
                    <div class="stat-content">
                        <div class="stat-value" th:text="${totalStudents}">0</div>
                        <div class="stat-label">Total Students</div>
                    </div>
                    <a th:href="@{/students}" class="stat-link stretched-link"></a>
                </div>
            </div>
            <div class="col-sm-6 col-xl-3">
                <div class="srms-stat-card srms-stat-teal">
                    <div class="stat-icon"><i class="bi bi-book-fill"></i></div>
                    <div class="stat-content">
                        <div class="stat-value" th:text="${totalCourses}">0</div>
                        <div class="stat-label">Total Courses</div>
                    </div>
                    <a th:href="@{/courses}" class="stat-link stretched-link"></a>
                </div>
            </div>
            <div class="col-sm-6 col-xl-3">
                <div class="srms-stat-card srms-stat-purple">
                    <div class="stat-icon"><i class="bi bi-journal-check"></i></div>
                    <div class="stat-content">
                        <div class="stat-value" th:text="${totalEnrollments}">0</div>
                        <div class="stat-label">Enrollments</div>
                    </div>
                    <a th:href="@{/enrollments/new}" class="stat-link stretched-link"></a>
                </div>
            </div>
            <div class="col-sm-6 col-xl-3">
                <div class="srms-stat-card srms-stat-green">
                    <div class="stat-icon"><i class="bi bi-award-fill"></i></div>
                    <div class="stat-content">
                        <div class="stat-value" th:text="${gradesEntered}">0</div>
                        <div class="stat-label">Grades Entered</div>
                    </div>
                    <a th:href="@{/grades/entry}" class="stat-link stretched-link"></a>
                </div>
            </div>
        </div>

        <!-- Recent Students Table -->
        <div class="srms-card">
            <div class="srms-card-header d-flex justify-content-between align-items-center">
                <h2 class="srms-card-title"><i class="bi bi-people me-2"></i>Recent Students</h2>
                <a th:href="@{/students}" class="btn btn-sm srms-btn-outline">View All <i class="bi bi-arrow-right ms-1"></i></a>
            </div>
            <div class="table-responsive">
                <table class="table srms-table mb-0" id="recentStudentsTable">
                    <thead>
                        <tr>
                            <th>Roll No.</th>
                            <th>Name</th>
                            <th>Department</th>
                            <th>Semester</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="student : ${recentStudents}">
                            <td><code th:text="${student.rollNumber}">23CS001</code></td>
                            <td>
                                <div class="d-flex align-items-center gap-2">
                                    <div class="srms-avatar" th:text="${#strings.substring(student.name, 0, 1)}">R</div>
                                    <span th:text="${student.name}">Name</span>
                                </div>
                            </td>
                            <td><span class="badge srms-badge-dept" th:text="${student.department}">CSE</span></td>
                            <td>Sem <span th:text="${student.currentSem}">3</span></td>
                            <td>
                                <span th:if="${student.isActive}" class="badge srms-badge-active">Active</span>
                                <span th:unless="${student.isActive}" class="badge srms-badge-inactive">Inactive</span>
                            </td>
                            <td>
                                <a th:href="@{/students/{id}(id=${student.id})}" class="btn btn-sm srms-btn-icon" title="View">
                                    <i class="bi bi-eye"></i>
                                </a>
                                <a th:href="@{/students/{id}/edit(id=${student.id})}" class="btn btn-sm srms-btn-icon" title="Edit">
                                    <i class="bi bi-pencil"></i>
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(recentStudents)}">
                            <td colspan="6" class="text-center py-4 text-muted">
                                <i class="bi bi-inbox fs-3 d-block mb-2"></i>No students yet.
                                <a th:href="@{/students/new}">Add one now</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</main>

<div th:replace="~{layout/fragments :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/srms.js}"></script>
</body>
</html>
